<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Portal | Sala Personalizada</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .timer-container {
            background: #111111;
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
            border: 1px solid #2a2a2a;
        }

        .timer-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #888;
            font-weight: 500;
            margin-bottom: 0.75rem;
        }

        .timer {
            font-family: 'Inter', monospace;
            font-size: 3rem;
            font-weight: 700;
            color: #e0e0e0;
            letter-spacing: 2px;
            background: #0a0a0a;
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            display: inline-block;
        }

        .timer-warning {
            font-size: 0.7rem;
            color: #666;
            margin-top: 0.75rem;
        }

        .timer-warning.urgent {
            color: #c0392b;
        }

        .card {
            background: #111111;
            border-radius: 1.25rem;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            margin-bottom: 1.5rem;
        }

        .card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #2a2a2a;
            background: #0d0d0d;
        }

        .card-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .card-header h2 {
            font-size: 1rem;
            font-weight: 500;
            color: #666;
        }

        .card-body {
            padding: 1.5rem;
        }

        .mensagens {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .mensagem-item {
            background: #0d0d0d;
            padding: 1.25rem;
            border-radius: 1rem;
            border-left: 4px solid #c0392b;
            font-size: 1rem;
            line-height: 1.5;
            color: #e0e0e0;
        }

        .fotos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }

        .foto {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 1rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
        }

        .foto:hover {
            transform: scale(1.02);
            opacity: 0.95;
        }

        .btn-pagar {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin: 1rem 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3);
        }

        .btn-pagar:hover {
            background: linear-gradient(135deg, #388e3c, #2e7d32);
            transform: scale(1.01);
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.4);
        }

        .btn-pagar:active {
            transform: scale(0.99);
        }

        /* Área de comprovante */
        .comprovante-area {
            background: #0d0d0d;
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
        }

        .comprovante-title {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .comprovante-input-area {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .file-btn {
            background: #1a1a1a;
            padding: 0.875rem 1rem;
            border-radius: 1rem;
            cursor: pointer;
            border: 1px solid #2a2a2a;
            color: #e0e0e0;
            font-size: 0.875rem;
            transition: 0.2s;
            flex: 1;
            text-align: center;
        }

        .file-btn:hover {
            background: #252525;
        }

        .btn-enviar {
            background: #c0392b;
            color: white;
            border: none;
            padding: 0.875rem 1.25rem;
            border-radius: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-enviar:hover {
            background: #a93226;
        }

        /* Chat - só aparece quando admin ativar */
        .chat-area {
            display: none;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #2a2a2a;
        }

        .chat-area.ativo {
            display: block;
        }

        .chat-messages {
            background: #0a0a0a;
            border-radius: 1rem;
            height: 250px;
            overflow-y: auto;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #2a2a2a;
        }

        .message {
            margin-bottom: 1rem;
            max-width: 85%;
            padding: 0.5rem 1rem;
            border-radius: 1rem;
            font-size: 0.875rem;
        }

        .message-admin {
            background: #1a2530;
            color: #e0e0e0;
            margin-left: auto;
            border-radius: 1rem 0.25rem 1rem 1rem;
        }

        .message-user {
            background: #1a1a1a;
            color: #e0e0e0;
            margin-right: auto;
            border-radius: 0.25rem 1rem 1rem 1rem;
            border: 1px solid #2a2a2a;
        }

        .message small {
            font-size: 0.6rem;
            opacity: 0.5;
            display: block;
            margin-top: 0.3rem;
        }

        .chat-input-area {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .chat-input-area input {
            flex: 1;
            padding: 0.75rem;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-radius: 1rem;
            color: #e0e0e0;
            font-size: 0.875rem;
        }

        .chat-send-btn {
            background: #c0392b;
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .sala-fechada {
            text-align: center;
            padding: 2rem;
            background: #111111;
            border-radius: 1rem;
            border: 1px solid #2a2a2a;
        }

        .sala-fechada h1 {
            color: #c0392b;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .sala-fechada p {
            color: #888;
            line-height: 1.6;
        }

        .loading, .empty-state {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            border: 1px solid #c0392b;
            color: #c0392b;
            padding: 0.75rem 1.25rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            animation: fadeInOut 3s ease;
            z-index: 1000;
            font-weight: 500;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            10% { opacity: 1; transform: translateX(-50%) translateY(0); }
            90% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(10px); }
        }

        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .image-modal img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            border-radius: 0.5rem;
        }

        .close-img {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            background: none;
            border: none;
        }

        .close-img:hover {
            color: #c0392b;
        }

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeInPopup 0.3s ease;
            cursor: pointer;
        }

        @keyframes fadeInPopup {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .popup-container {
            max-width: 90%;
            max-height: 90%;
            position: relative;
            animation: scaleIn 0.3s ease;
            border-radius: 1rem;
            overflow: hidden;
        }

        @keyframes scaleIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .popup-container img {
            max-width: 100%;
            max-height: 85vh;
            display: block;
        }

        .popup-close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .popup-close-btn:hover {
            background: #c0392b;
        }

        .popup-timer-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
        }

        .popup-timer-bar .timer-fill {
            height: 100%;
            width: 100%;
            background: #c0392b;
            animation: timerProgress linear forwards;
        }

        @keyframes timerProgress {
            from { width: 100%; }
            to { width: 0%; }
        }
    </style>
</head>
<body>
<div id="loading" class="loading">Carregando...</div>
<div id="content" style="display: none;"></div>
<div id="imageModal" class="image-modal" onclick="fecharImagem()">
    <button class="close-img" onclick="fecharImagem()">✕</button>
    <img id="modalImage" src="">
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://dados-c9c96-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const casaId = urlParams.get('id');
    let visitanteId = localStorage.getItem('visitanteId');
    let currentExpiraEm = null;
    let timerInterval = null;
    let chatUnsubscribe = null;
    let popupUnsubscribe = null;
    let chatAtivo = false;

    if (!visitanteId) {
        visitanteId = 'v_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        localStorage.setItem('visitanteId', visitanteId);
    }

    if (!casaId) {
        document.getElementById('loading').innerHTML = '<div class="empty-state">Acesso inválido</div>';
    } else {
        registrarVisita();
        carregarCasa(casaId);
        monitorarTempoDaSala(casaId);
        monitorarConfiguracoes(casaId);
    }

    async function registrarVisita() {
        const snapshot = await db.ref(`casas/${casaId}`).once('value');
        const casa = snapshot.val();
        if (casa && casa.nome) {
            await db.ref(`visitantes/${visitanteId}`).set({
                salaId: casaId,
                salaNome: casa.nome,
                idVisitante: visitanteId,
                entrada: Date.now(),
                ultimaAtividade: Date.now()
            });
            setInterval(() => {
                db.ref(`visitantes/${visitanteId}/ultimaAtividade`).set(Date.now());
            }, 30000);
        }
    }

    function abrirImagem(src) {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        modal.style.display = 'flex';
        modalImg.src = src;
    }

    function fecharImagem() {
        document.getElementById('imageModal').style.display = 'none';
    }

    function monitorarTempoDaSala(id) {
        db.ref(`casas/${id}`).on('value', (snapshot) => {
            const casa = snapshot.val();
            if (casa && casa.expiraEm && currentExpiraEm !== casa.expiraEm) {
                currentExpiraEm = casa.expiraEm;
                if (timerInterval) clearInterval(timerInterval);
                iniciarTimer(currentExpiraEm);
                mostrarToast('O administrador alterou o tempo da sala');
            }
        });
    }

    function monitorarConfiguracoes(id) {
        db.ref(`configuracoes/${id}/chatAtivo`).on('value', (snapshot) => {
            chatAtivo = snapshot.val() === true;
            const chatArea = document.getElementById('chatArea');
            if (chatArea) {
                if (chatAtivo) {
                    chatArea.classList.add('ativo');
                    iniciarChat(id);
                } else {
                    chatArea.classList.remove('ativo');
                    if (chatUnsubscribe) {
                        chatUnsubscribe();
                        chatUnsubscribe = null;
                    }
                }
            }
        });
    }

    function mostrarToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    function mostrarPopup(imagemUrl, duracaoMs, versaoAtual) {
        const storageKey = `popup_visto_${casaId}`;
        const versaoVista = localStorage.getItem(storageKey);
        
        if (versaoVista && parseInt(versaoVista) === versaoAtual) {
            return;
        }
        
        const overlay = document.createElement('div');
        overlay.className = 'popup-overlay';
        
        const container = document.createElement('div');
        container.className = 'popup-container';
        
        const img = document.createElement('img');
        img.src = imagemUrl;
        img.alt = 'Imagem';
        
        const closeBtn = document.createElement('button');
        closeBtn.innerHTML = '✕';
        closeBtn.className = 'popup-close-btn';
        
        const timerBar = document.createElement('div');
        timerBar.className = 'popup-timer-bar';
        const timerFill = document.createElement('div');
        timerFill.className = 'timer-fill';
        timerFill.style.animationDuration = `${duracaoMs}ms`;
        timerBar.appendChild(timerFill);
        
        container.appendChild(img);
        container.appendChild(closeBtn);
        container.appendChild(timerBar);
        overlay.appendChild(container);
        
        document.body.appendChild(overlay);
        
        const fecharPopup = () => {
            if (document.body.contains(overlay)) overlay.remove();
        };
        
        closeBtn.onclick = (e) => { e.stopPropagation(); fecharPopup(); };
        overlay.onclick = (e) => { if (e.target === overlay) fecharPopup(); };
        setTimeout(fecharPopup, duracaoMs);
        
        localStorage.setItem(storageKey, versaoAtual.toString());
    }

    function monitorarPopup(id) {
        if (popupUnsubscribe) popupUnsubscribe();
        const popupRef = db.ref(`casas/${id}/popup`);
        const listener = popupRef.on('value', (snapshot) => {
            const popupConfig = snapshot.val();
            if (popupConfig && popupConfig.ativo && popupConfig.imagem) {
                const versao = popupConfig.versao || 1;
                mostrarPopup(popupConfig.imagem, popupConfig.duracao || 5000, versao);
            }
        });
        popupUnsubscribe = () => popupRef.off('value', listener);
    }

    window.irParaPagamento = function() {
        window.location.href = `pagamento.html?id=${casaId}`;
    };

    window.enviarComprovante = async function() {
        const input = document.getElementById('fileInput');
        const file = input.files[0];
        if (!file) {
            mostrarToast("Selecione um arquivo primeiro");
            return;
        }
        
        const reader = new FileReader();
        reader.onload = async function(e) {
            const base64 = e.target.result;
            const isImage = file.type.startsWith('image/');
            
            await db.ref(`chats/${casaId}/mensagens`).push({
                de: 'user',
                texto: `📎 ${file.name}`,
                arquivo: base64,
                nome: file.name,
                tipo: isImage ? 'imagem' : 'arquivo',
                timestamp: Date.now(),
                lida: false
            });
            
            mostrarToast("Comprovante enviado com sucesso!");
            input.value = '';
        };
        reader.readAsDataURL(file);
    };

    window.enviarMensagemChat = async function() {
        if (!chatAtivo) {
            mostrarToast("Chat não está ativo no momento");
            return;
        }
        const input = document.getElementById('chatInput');
        const texto = input.value.trim();
        if (!texto) return;
        
        await db.ref(`chats/${casaId}/mensagens`).push({
            de: 'user',
            texto: texto,
            timestamp: Date.now(),
            lida: false
        });
        input.value = '';
    };

    function iniciarChat(id) {
        if (chatUnsubscribe) chatUnsubscribe();
        
        const messagesDiv = document.getElementById('chatMessages');
        const chatRef = db.ref(`chats/${id}/mensagens`).orderByChild('timestamp');
        
        const listener = chatRef.on('value', (snapshot) => {
            const msgs = snapshot.val();
            messagesDiv.innerHTML = '';
            if (msgs) {
                Object.values(msgs).forEach(msg => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${msg.de === 'admin' ? 'message-admin' : 'message-user'}`;
                    let content = `<strong>${msg.de === 'admin' ? 'Atendente' : 'Você'}</strong>`;
                    if (msg.texto) content += `<div>${escapeHtml(msg.texto)}</div>`;
                    if (msg.tipo === 'imagem' && msg.arquivo) {
                        content += `<img src="${msg.arquivo}" class="message-img" onclick="abrirImagem('${msg.arquivo}')" style="max-width:150px; border-radius:0.5rem; cursor:pointer;">`;
                    } else if (msg.tipo === 'arquivo' && msg.arquivo && msg.nome) {
                        content += `<div><a href="${msg.arquivo}" download="${msg.nome}" class="message-file" style="color:#c0392b; text-decoration:none;">📎 ${msg.nome}</a></div>`;
                    }
                    content += `<small>${new Date(msg.timestamp).toLocaleTimeString()}</small>`;
                    msgDiv.innerHTML = content;
                    messagesDiv.appendChild(msgDiv);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        });
        
        chatUnsubscribe = () => chatRef.off('value', listener);
    }

    async function carregarCasa(id) {
        const snapshot = await db.ref(`casas/${id}`).once('value');
        const casa = snapshot.val();
        if (!casa) {
            document.getElementById('loading').innerHTML = '<div class="empty-state">Sala não encontrada</div>';
            return;
        }
        if (casa.status === 'fechada') {
            const msg = casa.mensagemEncerramento || "Sala encerrada.";
            document.getElementById('loading').innerHTML = `<div class="sala-fechada"><h1>Sala Encerrada</h1><p>${msg}</p></div>`;
            return;
        }
        
        document.getElementById('loading').style.display = 'none';
        const container = document.getElementById('content');
        container.style.display = 'block';
        
        let html = `
            <div class="container">
                <div class="timer-container">
                    <div class="timer-label">TEMPO RESTANTE</div>
                    <div class="timer" id="timerDisplay">--:--:--</div>
                    <div class="timer-warning" id="timerWarning">Sistema será encerrado automaticamente</div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h1>${escapeHtml(casa.nome)}</h1>
                    </div>
                    <div class="card-body">
                        <div class="mensagens">
        `;
        
        if (casa.mensagens && casa.mensagens.length > 0) {
            casa.mensagens.forEach(msg => {
                html += `<div class="mensagem-item">${escapeHtml(msg)}</div>`;
            });
        } else {
            html += `<div class="mensagem-item">Nenhuma mensagem registrada</div>`;
        }
        
        html += `</div>`;
        
        if (casa.fotos && casa.fotos.length > 0) {
            html += `<div class="fotos-grid">`;
            casa.fotos.forEach(foto => {
                html += `<img src="${foto}" class="foto" onclick="abrirImagem('${foto}')">`;
            });
            html += `</div>`;
        }
        
        html += `
                        <button class="btn-pagar" onclick="irParaPagamento()">💰 PAGAR AGORA 💰</button>
                        
                        <div class="comprovante-area">
                            <div class="comprovante-title">📎 ENVIAR COMPROVANTE</div>
                            <div class="comprovante-input-area">
                                <button class="file-btn" onclick="document.getElementById('fileInput').click()">📎 Selecionar arquivo</button>
                                <input type="file" id="fileInput" style="display:none" accept="image/*,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.*">
                                <button class="btn-enviar" onclick="enviarComprovante()">Enviar</button>
                            </div>
                        </div>
                        
                        <div id="chatArea" class="chat-area">
                            <div class="comprovante-title">💬 CHAT COM ATENDENTE</div>
                            <div id="chatMessages" class="chat-messages"></div>
                            <div class="chat-input-area">
                                <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
                                <button class="chat-send-btn" onclick="enviarMensagemChat()">Enviar</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        container.innerHTML = html;
        
        currentExpiraEm = casa.expiraEm || (Date.now() + (48 * 3600000));
        iniciarTimer(currentExpiraEm);
        
        monitorarPopup(id);
    }

    function iniciarTimer(expiraEm) {
        const timerDisplay = document.getElementById('timerDisplay');
        const timerWarning = document.getElementById('timerWarning');
        if (!timerDisplay) return;
        
        function atualizarTimer() {
            const diff = expiraEm - Date.now();
            if (diff <= 0) {
                timerDisplay.innerHTML = '00:00:00';
                timerWarning.innerHTML = 'Sistema encerrado';
                timerWarning.classList.add('urgent');
                if (timerInterval) clearInterval(timerInterval);
                return;
            }
            
            const horas = Math.floor(diff / 3600000);
            const minutos = Math.floor((diff % 3600000) / 60000);
            const segundos = Math.floor((diff % 60000) / 1000);
            
            timerDisplay.innerHTML = `${horas.toString().padStart(2, '0')}:${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}`;
            
            if (diff < 3600000) {
                timerWarning.innerHTML = 'MENOS DE 1 HORA RESTANTE';
                timerWarning.classList.add('urgent');
                timerDisplay.style.color = '#ff4444';
            } else if (diff < 7200000) {
                timerWarning.innerHTML = 'MENOS DE 2 HORAS RESTANTES';
                timerWarning.classList.add('urgent');
            } else {
                timerWarning.innerHTML = 'SISTEMA SERÁ ENCERRADO AUTOMATICAMENTE';
                timerWarning.classList.remove('urgent');
                timerDisplay.style.color = '#e0e0e0';
            }
        }
        
        atualizarTimer();
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(atualizarTimer, 1000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
</html>
