<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pagamento | Sala</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 1rem;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: #121212;
            border-radius: 1.5rem;
            border: 1px solid #2a2a2a;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .card-header {
            padding: 1.5rem;
            border-bottom: 1px solid #2a2a2a;
            background: #0d0d0d;
            text-align: center;
        }
        .card-header h1 { font-size: 1.5rem; font-weight: 700; color: #ff9500; }
        .card-header p { font-size: 0.8rem; color: #666; margin-top: 0.25rem; }
        .card-body { padding: 1.5rem; text-align: center; }
        .qr-container { background: white; padding: 1rem; border-radius: 1rem; display: inline-block; margin: 1rem 0; }
        .codigo-container {
            background: #0d0d0d;
            border-radius: 1rem;
            padding: 1rem;
            margin: 1rem 0;
            border: 1px solid #2a2a2a;
        }
        .codigo-label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .codigo-valor { font-size: 1.5rem; font-weight: 700; font-family: monospace; color: #ff9500; margin: 0.5rem 0; word-break: break-all; }
        .btn-copiar {
            background: #2a2a2a;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-copiar:hover { background: #3a3a3a; }
        .info-text { font-size: 0.7rem; color: #666; margin-top: 1rem; }
        .btn-voltar {
            background: #2a2a2a;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            cursor: pointer;
            margin-top: 1rem;
            width: 100%;
        }
        .loading { text-align: center; padding: 3rem; color: #666; }
        .error { text-align: center; padding: 2rem; color: #ff3b30; }
    </style>
</head>
<body>
<div class="container">
    <div id="content">
        <div class="loading">Carregando informações de pagamento...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://dados-c9c96-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const salaId = urlParams.get('id');

    if (!salaId) {
        document.getElementById('content').innerHTML = '<div class="error">❌ Código inválido</div>';
    } else {
        carregarPagamento(salaId);
    }

    async function carregarPagamento(id) {
        try {
            const snapshot = await db.ref(`casas/${id}`).once('value');
            const sala = snapshot.val();

            if (!sala) {
                document.getElementById('content').innerHTML = '<div class="error">❌ Sala não encontrada</div>';
                return;
            }

            const codigoPagamento = sala.codigoPagamento || 'NÃO DEFINIDO';
            const urlPagamento = `https://${window.location.hostname}${window.location.pathname.replace('pagamento.html', '')}pagamento.html?id=${id}`;

            let html = `
                <div class="card">
                    <div class="card-header">
                        <h1>💰 Pagamento</h1>
                        <p>${escapeHtml(sala.nome)}</p>
                    </div>
                    <div class="card-body">
                        <div class="qr-container" id="qrContainer"></div>
                        <div class="codigo-container">
                            <div class="codigo-label">CÓDIGO PARA PAGAMENTO</div>
                            <div class="codigo-valor" id="codigoValor">${escapeHtml(codigoPagamento)}</div>
                            <button class="btn-copiar" onclick="copiarCodigo()">📋 Copiar código</button>
                        </div>
                        <div class="info-text">
                            🔍 Escaneie o QR Code ou copie o código acima para realizar o pagamento
                        </div>
                        <button class="btn-voltar" onclick="window.location.href='index.html?id=${id}'">← Voltar para a sala</button>
                    </div>
                </div>
            `;

            document.getElementById('content').innerHTML = html;

            new QRCode(document.getElementById("qrContainer"), {
                text: codigoPagamento,
                width: 200,
                height: 200
            });

        } catch (error) {
            console.error('Erro:', error);
            document.getElementById('content').innerHTML = '<div class="error">❌ Erro ao carregar informações</div>';
        }
    }

    function copiarCodigo() {
        const codigo = document.getElementById('codigoValor').innerText;
        navigator.clipboard.writeText(codigo);
        alert('✅ Código copiado para a área de transferência!');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
</html>
